dimensions:
- key: stylometry
  children:
  - key: stylometry-corpus
    children:
    - key: stylometry-corpus-length
      class: LengthDimension
      description: Counts the length of the text
    - key: stylometry-corpus-TTR
      class: RTIEDimension
      description: Standardized ratios TTR
      separator: whole
    - key: stylometry-corpus-TTR-standard
      class: RTIEDimension
      description: TTR (by chunks)
      separator: by-chunks
    - key: stylometry-corpus-TTR-deviation
      class: RTIEDeviationDimension
      description: TTR (by chunks)
      separator: by-chunks
    - key: stylometry-corpus-words-count
      class: WordCountDimension
      description: Counts how many words there are in the text
    - key: stylometry-corpus-syllabes-count
      class: SyllableCountDimension
      description: Counts how many syllabes there are in the text
    - key: stylometry-corpus-syllabes-per-word
      class: SyllablePerWordDimension
      description: Counts how many syllabes there per word
    - key: stylometry-corpus-words-per-sentence
      class: WordPerSentenceDimension
      description: The average number of words per sentence
    - key: stylometry-corpus-uppercase
      class: WordCase
      description: The average number of words written in uppercase
      comparator: upper
    - key: stylometry-corpus-titlecase
      class: WordCase
      description: The average number of words written in titlecase
      comparator: title
    - key: stylometry-corpus-writing-style
      children:
      - key: stylometry-corpus-readability
        class: ReadabilityDimension
        description: Measures the readability within of the text
      - key: stylometry-corpus-inflesz
        class: PerspicuityDimension
        description: Measures the perspicuity within of the text
    - key: stylometry-corpus-expressions-quoted
      class: PatternDimension
      description: Counts how many quoted expressions
      pattern: '["“‘''«][\p{L}\p{N}\s\-\,\.]{4,64}[”"’''»]'
      percentage: false
      separator: whole
    - key: stylometry-corpus-expressions-within-parenthesis
      class: PatternDimension
      description: Counts how many expressions within paranthesis
      pattern: '\([\p{L}\p{N}\s\-\,\.]{4,64}\)'
      percentage: false
    - key: stylometry-corpus-expressions-within-asterisks
      class: PatternDimension
      description: Counts how many expressions within asterisks
      pattern: '\*[\p{L}\p{N}\s\-\,\.]{4,64}\*'
      percentage: false
    - key: stylometry-corpus-words-length-avg
      class: AverageWordLengthDimension
      description: The average length of the words
    - key: stylometry-corpus-words-longer-6ltr
      class: WordLengthDimension
      description: The number of words bigger than 6 characters
      comparator: '>='
      length: '6'
    - key: stylometry-corpus-words-with-1ltr
      class: WordLengthDimension
      description: The number of words equal to 1 characters
      length: '1'
      comparator: '='
