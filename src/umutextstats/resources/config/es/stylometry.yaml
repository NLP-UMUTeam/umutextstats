  - key: stylometry-sentences
    children:
    - key: stylometry-sentences-count
      class: SentenceCountDimension
      description: Counts how many sentences there are in the text
    - key: stylometry-sentences-exclamative-percentage
      class: PatternDimension
      description: Counts how many exclamative sentences there are in the text
      pattern: '[\p{L}\p{N}\s]+[\!]+'
      separator: by-sentence
    - key: stylometry-sentences-exclamative-percentage-emphasis
      class: PatternDimension
      description: Counts how many exclamative sentences there are in the text
      pattern: '[\p{L}\p{N}\s]+[\!]{2,}'
      separator: by-sentence
    - key: stylometry-sentences-interrogative-percentage
      class: PatternDimension
      description: Counts how many exclamative sentences there are in the text with more than "?"
      pattern: '[\p{L}\p{N}\s]+[\?]+'
      separator: by-sentence
    - key: stylometry-sentences-interrogative-percentage-emphasis
      class: PatternDimension
      description: Counts how many interrogative sentences there are in the text with more than one "?"
      pattern: '[\p{L}\p{N}\s]+[\?]{2,}'
      separator: by-sentence
    - key: stylometry-sentences-quotes-percentage
      class: PatternDimension
      description: Counts how many quoted sentences
      pattern: '^[“"][\p{L}\p{N}\s]+["”]$'
      separator: by-sentence
    - key: stylometry-sentences-conversations
      class: PatternDimension
      description: Counts how many sentences simulate a conversation
      pattern: '\-[\s\¿]*\p{L}+'
      separator: by-sentence
  - key: stylometry-punctuation
    children:
    - key: stylometry-punctuation-prime
      class: CharacterCountDimension
      description: Number of prime symbols
      character: '′‴″'
    - key: stylometry-punctuation-currencies
      class: CharacterCountDimension
      description: Number of symbols used as currency symbols
      character: '€$£'
    - key: stylometry-punctuation-apostrophe
      class: CharacterCountDimension
      description: Apostrohpes, can be used to measure units or in Elision of words
      character: '’'''
    - key: stylometry-punctuation-brackets-open
      class: CharacterCountDimension
      description: Number of open curly brackets
      character: '{[(〔'
    - key: stylometry-punctuation-curly-brackets-close
      class: CharacterCountDimension
      description: Number of closed curly brackets
      character: '}])〕'
    - key: stylometry-punctuation-quotation-open
      class: CharacterCountDimension
      description: Number of quotation open symbols
      character: '"“‘''''«'
    - key: stylometry-punctuation-quotation-close
      class: CharacterCountDimension
      description: Number of quotation close symbols
      character: '”"’''»'
    - key: stylometry-punctuation-colons
      class: CharacterCountDimension
      description: Number of colons
      character: ':ː：∶'
      removeemojis: 'true'
    - key: stylometry-punctuation-semicolons
      class: CharacterCountDimension
      description: Number of semicolons
      character: ';'
    - key: stylometry-punctuation-dashes
      class: CharacterCountDimension
      description: Number of dashed
      character: '-'
    - key: stylometry-punctuation-low-dashes
      class: CharacterCountDimension
      description: Number of low dashed
      character: '_'
    - key: stylometry-punctuation-fullstop
      class: CharacterCountDimension
      description: Number of fullstops
      character: '.'
    - key: stylometry-punctuation-commas
      class: CharacterCountDimension
      description: Number of commas
      character: ',ʻ،、︐︑﹐﹑，､'
    - key: stylometry-punctuation-ellipsis
      class: PatternDimension
      description: Number of ellipsis
      pattern: '…|\.{3,}'
      use_original_input: true
      separator: by-spaces
    - key: stylometry-punctuation-open-question
      class: CharacterCountDimension
      description: Number of open question symbol
      character: '¿'
    - key: stylometry-punctuation-open-exclamation
      class: CharacterCountDimension
      description: Number of open exclamation symbol
      character: '¡'
    - key: stylometry-punctuation-space
      class: CharacterCountDimension
      description: Number of spaces
      character: '\s'
    - key: stylometry-punctuation-interdot
      class: CharacterCountDimension
      description: Number of interdots
      character: '·'
    - key: stylometry-punctuation-percentages
      class: CharacterCountDimension
      description: Number of percentages
      character: '%‰‱'
    - key: stylometry-punctuation-ampersand
      class: CharacterCountDimension
      description: Number of ampersands
      character: '&'
    - key: stylometry-punctuation-at-sign
      class: CharacterCountDimension
      description: Number of at sign symbols
      character: '@'
    - key: stylometry-punctuation-backslash
      class: CharacterCountDimension
      description: Number of backslash symbols
      character: '\'
    - key: stylometry-punctuation-pipe
      class: CharacterCountDimension
      description: Number of pipe symbols
      character: '|¦'
    - key: stylometry-punctuation-bullet
      class: CharacterCountDimension
      description: Number of bullet symbols
      character: '•'
    - key: stylometry-punctuation-caret
      class: CharacterCountDimension
      description: Number of caret symbols
      character: '^^‸⁁＾'
    - key: stylometry-punctuation-degree
      class: CharacterCountDimension
      description: Number of degree symbols
      character: 'º'
    - key: stylometry-punctuation-ditto-mark
      class: CharacterCountDimension
      description: Number of ditto marks, that expresses that the words or figures above it are to be repeated
      character: '”'
    - key: stylometry-punctuation-hash
      class: CharacterCountDimension
      description: Number of hash symbols
      character: '#'
    - key: stylometry-punctuation-numero-sign
      class: PatternDimension
      description: Number of numero signs
      pattern: '(№|Nº|No,|No\.|no.)'
    - key: stylometry-punctuation-pilcrow
      class: CharacterCountDimension
      description: Number of pilcrow symbol, that are typographical characters that mark the star of a paragraph
      character: '¶'
    - key: stylometry-punctuation-trademarks
      class: CharacterCountDimension
      description: Number of copyright or trademark signs
      character: '©®™'
    - key: stylometry-punctuation-mathematical-signs
      class: CharacterCountDimension
      description: Number of mathematical signs
      character: '−-≠+×*·+÷=≈~'